<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>cc-lab · intermission</title>
    <link rel="stylesheet" href="./overlay-palette.css" />
    <style>
      /* V2 streaming break card. Calm. The hero ship sits in its own
       * zone left, the message + countdown sit right, hairline divider
       * between. Countdown text is a placeholder — V2 wires the timer. */
      html,
      body {
        background: var(--cc-bg-ship-match);
        position: relative;
        overflow: hidden;
      }

      .frame {
        position: absolute;
        inset: 88px;
        border-top: 1px solid var(--cc-hull-line);
        border-bottom: 1px solid var(--cc-hull-line);
        display: grid;
        grid-template-columns: 57% 1px 1fr;
        align-items: center;
      }

      .ship {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .ship img {
        max-width: 100%;
        max-height: 720px;
        object-fit: contain;
      }

      .divider {
        width: 1px;
        height: 60%;
        background: var(--cc-hull-line);
        align-self: center;
      }

      .panel {
        padding: 0 64px;
        color: var(--cc-text);
      }

      .eyebrow {
        font-family: var(--cc-font-mono);
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        color: var(--cc-teal);
        display: inline-flex;
        align-items: center;
        gap: 12px;
      }

      .eyebrow::before {
        content: "";
        width: 28px;
        height: 1px;
        background: var(--cc-teal);
      }

      .title {
        margin: 28px 0 24px;
        font-family: var(--cc-font-display);
        font-weight: 600;
        font-size: 72px;
        line-height: 1.05;
        letter-spacing: -0.01em;
      }

      .timer {
        font-family: var(--cc-font-mono);
        font-size: 22px;
        letter-spacing: 0.16em;
        color: var(--cc-text-soft);
      }

      .slate {
        position: absolute;
        top: 32px;
        left: 32px;
        font-family: var(--cc-font-mono);
        font-size: 13px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--cc-text-muted);
      }

      .pill {
        position: absolute;
        bottom: 32px;
        right: 32px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 5px 14px;
        background: rgba(35, 33, 54, 0.7);
        border: 1px solid rgba(246, 193, 119, 0.34);
        border-radius: 999px;
        font-family: var(--cc-font-mono);
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--cc-yellow);
      }

      .pill::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--cc-yellow);
      }
    </style>
  </head>
  <body>
    <span class="slate">— intermission</span>
    <div class="frame">
      <div class="ship">
        <img
          class="ship-feather"
          src="https://cc-lab.ondrejsvec.com/hero.png"
          alt=""
          aria-hidden="true"
        />
      </div>
      <div class="divider" aria-hidden="true"></div>
      <div class="panel">
        <span class="eyebrow">stand by</span>
        <h1 class="title">Back in 2 min.</h1>
        <p class="timer" data-slot="timer">02:00</p>
      </div>
    </div>
    <span class="pill">Don't Panic</span>
  </body>
</html>
