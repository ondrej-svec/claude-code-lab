<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>cc-lab · stream deck icon</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&family=Space+Grotesk:wght@500;600&family=JetBrains+Mono:wght@500;600&display=swap"
    />
    <style>
      /* Stream Deck MK.2 keys are 72×72px native, but the app accepts up
       * to 144×144 PNGs and downscales. Render at 288×288 so retina
       * downscaling stays crisp; the bash renderer captures at 144×144
       * with deviceScaleFactor 2. */
      :root {
        --font-display: "Space Grotesk", "Avenir Next", sans-serif;
        --font-mono: "JetBrains Mono", "SF Mono", ui-monospace, monospace;
        --font-body: "Manrope", -apple-system, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 144px;
        height: 144px;
        background: transparent;
      }

      .icon {
        width: 144px;
        height: 144px;
        position: relative;
        background: var(--bg, #26233a);
        border: 2px solid var(--border, rgba(224, 222, 244, 0.18));
        border-radius: 18px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 8px 10px;
        overflow: hidden;
      }

      /* Subtle inner glow for atmosphere — keeps the lab's restraint. */
      .icon::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 18px;
        background: radial-gradient(
          ellipse at top,
          rgba(255, 255, 255, 0.06),
          transparent 70%
        );
        pointer-events: none;
      }

      .label {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: 22px;
        line-height: 1.05;
        letter-spacing: 0.02em;
        text-align: center;
        color: var(--text, #e0def4);
        white-space: pre-line;
        position: relative;
        z-index: 1;
      }

      /* Kind-specific tweaks via data attribute. */
      .icon[data-kind="mono"] .label {
        font-family: var(--font-mono);
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 0.04em;
      }

      .icon[data-kind="rec"] .label {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .corner-pip {
        position: absolute;
        top: 10px;
        left: 12px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--text, #e0def4);
        opacity: 0.4;
      }

      .icon[data-kind="rec"] .corner-pip {
        opacity: 1;
        background: var(--text, #eb6f92);
        box-shadow: 0 0 8px var(--text, #eb6f92);
      }
    </style>
  </head>
  <body>
    <div class="icon" data-slot="icon">
      <span class="corner-pip" aria-hidden="true"></span>
      <span class="label" data-slot="label">label</span>
    </div>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const root = document.querySelector('[data-slot="icon"]');
        const labelEl = document.querySelector('[data-slot="label"]');
        const label = params.get("label") ?? "label";
        const bg = params.get("bg");
        const text = params.get("text");
        const border = params.get("border");
        const kind = params.get("kind") ?? "default";
        if (labelEl) labelEl.textContent = label;
        if (root) {
          root.dataset.kind = kind;
          if (bg) root.style.setProperty("--bg", bg);
          if (text) root.style.setProperty("--text", text);
          if (border) root.style.setProperty("--border", border);
        }
      })();
    </script>
  </body>
</html>
